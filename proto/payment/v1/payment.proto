syntax = "proto3";

package payment.v1;

option go_package = "github.com/jetkzu/jetkzu/gen/go/payment/v1;paymentv1";

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc GetPaymentByRide(GetPaymentByRideRequest) returns (GetPaymentByRideResponse);
  rpc GetPayment(GetPaymentRequest) returns (GetPaymentResponse);
  rpc ListUserPayments(ListUserPaymentsRequest) returns (ListUserPaymentsResponse);
  rpc ListFailedPayments(ListFailedPaymentsRequest) returns (ListFailedPaymentsResponse);
  rpc GetPaymentReceipt(GetPaymentReceiptRequest) returns (GetPaymentReceiptResponse);
  rpc ValidatePaymentMethod(ValidatePaymentMethodRequest) returns (ValidatePaymentMethodResponse);
  rpc ProcessPayment(ProcessPaymentRequest) returns (ProcessPaymentResponse);
  rpc CreateRefundRequest(CreateRefundRequestRequest) returns (CreateRefundRequestResponse);
  rpc RefundPayment(RefundPaymentRequest) returns (RefundPaymentResponse);
}

message Payment {
  string id = 1;
  string ride_id = 2;
  string user_id = 3;
  double amount = 4;
  string currency = 5;
  string status = 6; // pending | succeeded | failed | refunded
  string method = 7; // card | cash | wallet
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreatePaymentRequest {
  string ride_id = 1;
  string user_id = 2;
  double amount = 3;
  string method = 4;
}
message CreatePaymentResponse { Payment payment = 1; }

message GetPaymentByRideRequest { string ride_id = 1; }
message GetPaymentByRideResponse { Payment payment = 1; }

message GetPaymentRequest { string payment_id = 1; }
message GetPaymentResponse { Payment payment = 1; }

message ListUserPaymentsRequest {
  string user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}
message ListUserPaymentsResponse { repeated Payment payments = 1; }

message ListFailedPaymentsRequest {
  int32 limit = 1;
  int32 offset = 2;
}
message ListFailedPaymentsResponse { repeated Payment payments = 1; }

message GetPaymentReceiptRequest { string payment_id = 1; }
message GetPaymentReceiptResponse {
  string receipt_id = 1;
  Payment payment = 2;
  string summary = 3;
}

message ValidatePaymentMethodRequest {
  string method = 1;
}
message ValidatePaymentMethodResponse {
  bool valid = 1;
  string message = 2;
}

message ProcessPaymentRequest { string payment_id = 1; }
message ProcessPaymentResponse { Payment payment = 1; }

message CreateRefundRequestRequest {
  string payment_id = 1;
  string reason = 2;
}
message CreateRefundRequestResponse {
  string refund_request_id = 1;
  Payment payment = 2;
}

message RefundPaymentRequest {
  string payment_id = 1;
  string reason = 2;
}
message RefundPaymentResponse { Payment payment = 1; }
