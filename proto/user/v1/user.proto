syntax = "proto3";

package user.v1;

option go_package = "github.com/jetkzu/jetkzu/gen/go/user/v1;userv1";

import "google/protobuf/timestamp.proto";

service UserService {
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
  rpc LogoutUser(LogoutUserRequest) returns (LogoutUserResponse);
  rpc ValidateSession(ValidateSessionRequest) returns (ValidateSessionResponse);
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UpdateUserProfileResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc VerifyUserEmail(VerifyUserEmailRequest) returns (VerifyUserEmailResponse);
  rpc ResendVerification(ResendVerificationRequest) returns (ResendVerificationResponse);
  rpc DeactivateUser(DeactivateUserRequest) returns (DeactivateUserResponse);
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse);
}

message User {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string phone = 4;
  string role = 5; // passenger | driver | admin
  bool email_verified = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message RegisterUserRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
  string phone = 4;
  string role = 5;
}
message RegisterUserResponse {
  User user = 1;
  string verification_token = 2;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}
message LoginUserResponse {
  string access_token = 1;
  google.protobuf.Timestamp expires_at = 2;
  User user = 3;
}

message LogoutUserRequest {
  string user_id = 1;
}
message LogoutUserResponse { bool ok = 1; }

message ValidateSessionRequest {
  string access_token = 1;
}
message ValidateSessionResponse {
  bool valid = 1;
  User user = 2;
}

message GetUserProfileRequest {
  string user_id = 1;
}
message GetUserProfileResponse {
  User user = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}
message GetUserByEmailResponse {
  User user = 1;
}

message ListUsersRequest {
  int32 limit = 1;
  int32 offset = 2;
  string role = 3;
}
message ListUsersResponse {
  repeated User users = 1;
}

message UpdateUserProfileRequest {
  string user_id = 1;
  string full_name = 2;
  string phone = 3;
}
message UpdateUserProfileResponse {
  User user = 1;
}

message ChangePasswordRequest {
  string user_id = 1;
  string old_password = 2;
  string new_password = 3;
}
message ChangePasswordResponse { bool changed = 1; }

message ResetPasswordRequest {
  string email = 1;
  string new_password = 2;
}
message ResetPasswordResponse { bool reset = 1; }

message VerifyUserEmailRequest {
  string user_id = 1;
  string token = 2;
}
message VerifyUserEmailResponse {
  bool verified = 1;
}

message ResendVerificationRequest {
  string user_id = 1;
}
message ResendVerificationResponse {
  string verification_token = 1;
}

message DeactivateUserRequest {
  string user_id = 1;
}
message DeactivateUserResponse {
  User user = 1;
}

message UpdateUserRoleRequest {
  string user_id = 1;
  string role = 2;
}
message UpdateUserRoleResponse {
  User user = 1;
}
