name: jetkzu

x-backend-common: &backend-common
  image: ${BACKEND_IMAGE:-jetkzu-backend:prod}
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped

x-service-env: &service-env
  NATS_URL: nats://nats:4222

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jetkzu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.vps}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jetkzu -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/user/migrations:/migrations/users:ro
      - ./services/driver/migrations:/migrations/drivers:ro
      - ./services/ride/migrations:/migrations/rides:ro
      - ./services/payment/migrations:/migrations/payments:ro
      - ./services/notification/migrations:/migrations/notifications:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        for svc in users drivers rides payments notifications; do
          echo "Running migrations for jetkzu_$$svc";
          migrate -path /migrations/$$svc -database "postgres://jetkzu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.vps}@postgres:5432/jetkzu_$$svc?sslmode=disable" up;
        done
    restart: "no"

  user-service:
    <<: *backend-common
    command: ["/app/user-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      <<: *service-env
      GRPC_PORT: 50051
      HTTP_PORT: 8081
      DATABASE_URL: postgres://jetkzu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.vps}@postgres:5432/jetkzu_users?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.vps}
      JWT_TTL: ${JWT_TTL:-24h}
    expose: ["50051", "8081"]

  driver-service:
    <<: *backend-common
    command: ["/app/driver-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      <<: *service-env
      GRPC_PORT: 50052
      HTTP_PORT: 8082
      DATABASE_URL: postgres://jetkzu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.vps}@postgres:5432/jetkzu_drivers?sslmode=disable
      REDIS_ADDR: redis:6379
    expose: ["50052", "8082"]

  ride-service:
    <<: *backend-common
    command: ["/app/ride-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      <<: *service-env
      GRPC_PORT: 50053
      HTTP_PORT: 8083
      DATABASE_URL: postgres://jetkzu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.vps}@postgres:5432/jetkzu_rides?sslmode=disable
    expose: ["50053", "8083"]

  payment-service:
    <<: *backend-common
    command: ["/app/payment-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      <<: *service-env
      GRPC_PORT: 50054
      HTTP_PORT: 8084
      DATABASE_URL: postgres://jetkzu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.vps}@postgres:5432/jetkzu_payments?sslmode=disable
    expose: ["50054", "8084"]

  notification-service:
    <<: *backend-common
    command: ["/app/notification-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      <<: *service-env
      GRPC_PORT: 50055
      HTTP_PORT: 8085
      DATABASE_URL: postgres://jetkzu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.vps}@postgres:5432/jetkzu_notifications?sslmode=disable
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@jetkzu.kz}
    expose: ["50055", "8085"]

  api-gateway:
    <<: *backend-common
    command: ["/app/api-gateway"]
    depends_on:
      - user-service
      - driver-service
      - ride-service
      - payment-service
      - notification-service
    environment:
      HTTP_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.vps}
      USER_SERVICE_ADDR: user-service:50051
      DRIVER_SERVICE_ADDR: driver-service:50052
      RIDE_SERVICE_ADDR: ride-service:50053
      PAYMENT_SERVICE_ADDR: payment-service:50054
      NOTIFICATION_SERVICE_ADDR: notification-service:50055
      GRPC_TIMEOUT: ${GRPC_TIMEOUT:-5s}
    ports:
      - "${GATEWAY_BIND_ADDR:-127.0.0.1}:${GATEWAY_HOST_PORT:-8080}:8080"

  frontend:
    image: ${FRONTEND_IMAGE:-jetkzu-frontend:prod}
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "${FRONTEND_BIND_ADDR:-0.0.0.0}:${FRONTEND_HOST_PORT:-80}:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_BIND_ADDR:-127.0.0.1}:${PROMETHEUS_HOST_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env.vps}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND_ADDR:-127.0.0.1}:${GRAFANA_HOST_PORT:-3001}:3000"

volumes:
  postgres_data:
  redis_data:
  nats_data:
  prometheus_data:
  grafana_data:
