name: jetkzu

x-backend-image: &backend-image
  image: jetkzu-backend:dev

x-backend-build: &backend-build
  image: jetkzu-backend:dev
  build:
    context: .
    dockerfile: Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jetkzu
      POSTGRES_PASSWORD: jetkzu
      POSTGRES_DB: postgres
    # Override or remove ports if 5432 is busy on host. Stack works without it.
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jetkzu -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_HOST_PORT:-14222}:4222"
      - "${NATS_UI_HOST_PORT:-18222}:8222"

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/user/migrations:/migrations/users
      - ./services/driver/migrations:/migrations/drivers
      - ./services/ride/migrations:/migrations/rides
      - ./services/payment/migrations:/migrations/payments
      - ./services/notification/migrations:/migrations/notifications
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        for svc in users drivers rides payments notifications; do
          echo "Running migrations for jetkzu_$$svc";
          migrate -path /migrations/$$svc -database "postgres://jetkzu:jetkzu@postgres:5432/jetkzu_$$svc?sslmode=disable" up;
        done
    restart: "no"

  user-service:
    <<: *backend-image
    command: ["/app/user-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50051
      HTTP_PORT: 8081
      DATABASE_URL: postgres://jetkzu:jetkzu@postgres:5432/jetkzu_users?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    expose: [ "50051", "8081" ]

  driver-service:
    <<: *backend-image
    command: ["/app/driver-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50052
      HTTP_PORT: 8082
      DATABASE_URL: postgres://jetkzu:jetkzu@postgres:5432/jetkzu_drivers?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
    expose: [ "50052", "8082" ]

  ride-service:
    <<: *backend-image
    command: ["/app/ride-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50053
      HTTP_PORT: 8083
      DATABASE_URL: postgres://jetkzu:jetkzu@postgres:5432/jetkzu_rides?sslmode=disable
      NATS_URL: nats://nats:4222
    expose: [ "50053", "8083" ]

  payment-service:
    <<: *backend-image
    command: ["/app/payment-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50054
      HTTP_PORT: 8084
      DATABASE_URL: postgres://jetkzu:jetkzu@postgres:5432/jetkzu_payments?sslmode=disable
      NATS_URL: nats://nats:4222
    expose: [ "50054", "8084" ]

  notification-service:
    <<: *backend-image
    command: ["/app/notification-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50055
      HTTP_PORT: 8085
      DATABASE_URL: postgres://jetkzu:jetkzu@postgres:5432/jetkzu_notifications?sslmode=disable
      NATS_URL: nats://nats:4222
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@jetkzu.kz}
    expose: [ "50055", "8085" ]

  api-gateway:
    <<: *backend-build
    command: ["/app/api-gateway"]
    depends_on:
      - user-service
      - driver-service
      - ride-service
      - payment-service
      - notification-service
    environment:
      HTTP_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      USER_SERVICE_ADDR: user-service:50051
      DRIVER_SERVICE_ADDR: driver-service:50052
      RIDE_SERVICE_ADDR: ride-service:50053
      PAYMENT_SERVICE_ADDR: payment-service:50054
      NOTIFICATION_SERVICE_ADDR: notification-service:50055
      GRPC_TIMEOUT: 5s
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"

volumes:
  postgres_data:
