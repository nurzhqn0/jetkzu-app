global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-service:8081
          - driver-service:8082
          - ride-service:8083
          - payment-service:8084
          - notification-service:8085
