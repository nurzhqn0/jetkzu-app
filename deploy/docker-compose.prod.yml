name: jetkzu

x-backend-image: &backend-image
  image: jetkzu-backend:${APP_TAG:-latest}

x-backend-build: &backend-build
  image: jetkzu-backend:${APP_TAG:-latest}
  build:
    context: ..
    dockerfile: Dockerfile

services:
  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jetkzu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jetkzu} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../services/user/migrations:/migrations/users:ro
      - ../services/driver/migrations:/migrations/drivers:ro
      - ../services/ride/migrations:/migrations/rides:ro
      - ../services/payment/migrations:/migrations/payments:ro
      - ../services/notification/migrations:/migrations/notifications:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        for svc in users drivers rides payments notifications; do
          echo "Running migrations for jetkzu_$$svc";
          migrate -path /migrations/$$svc -database "postgres://${POSTGRES_USER:-jetkzu}:${POSTGRES_PASSWORD}@postgres:5432/jetkzu_$$svc?sslmode=disable" up;
        done
    restart: "no"

  user-service:
    <<: *backend-image
    command: ["/app/user-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50051
      HTTP_PORT: 8081
      DATABASE_URL: postgres://${POSTGRES_USER:-jetkzu}:${POSTGRES_PASSWORD}@postgres:5432/jetkzu_users?sslmode=disable
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
    restart: unless-stopped

  driver-service:
    <<: *backend-image
    command: ["/app/driver-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50052
      HTTP_PORT: 8082
      DATABASE_URL: postgres://${POSTGRES_USER:-jetkzu}:${POSTGRES_PASSWORD}@postgres:5432/jetkzu_drivers?sslmode=disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
    restart: unless-stopped

  ride-service:
    <<: *backend-image
    command: ["/app/ride-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50053
      HTTP_PORT: 8083
      DATABASE_URL: postgres://${POSTGRES_USER:-jetkzu}:${POSTGRES_PASSWORD}@postgres:5432/jetkzu_rides?sslmode=disable
      NATS_URL: nats://nats:4222
    restart: unless-stopped

  payment-service:
    <<: *backend-image
    command: ["/app/payment-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50054
      HTTP_PORT: 8084
      DATABASE_URL: postgres://${POSTGRES_USER:-jetkzu}:${POSTGRES_PASSWORD}@postgres:5432/jetkzu_payments?sslmode=disable
      NATS_URL: nats://nats:4222
    restart: unless-stopped

  notification-service:
    <<: *backend-image
    command: ["/app/notification-service"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      GRPC_PORT: 50055
      HTTP_PORT: 8085
      DATABASE_URL: postgres://${POSTGRES_USER:-jetkzu}:${POSTGRES_PASSWORD}@postgres:5432/jetkzu_notifications?sslmode=disable
      NATS_URL: nats://nats:4222
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@jetkzu.nurzhqn.com}
    restart: unless-stopped

  api-gateway:
    <<: *backend-build
    command: ["/app/api-gateway"]
    depends_on:
      - user-service
      - driver-service
      - ride-service
      - payment-service
      - notification-service
    environment:
      HTTP_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      USER_SERVICE_ADDR: user-service:50051
      DRIVER_SERVICE_ADDR: driver-service:50052
      RIDE_SERVICE_ADDR: ride-service:50053
      PAYMENT_SERVICE_ADDR: payment-service:50054
      NOTIFICATION_SERVICE_ADDR: notification-service:50055
      GRPC_TIMEOUT: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
    depends_on:
      - api-gateway
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3001}:3000"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
